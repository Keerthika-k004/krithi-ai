<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 540" width="400" height="540">
  <defs>
    <linearGradient id="roseGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A89D"/>
      <stop offset="50%" stop-color="#C9A49A"/>
      <stop offset="100%" stop-color="#BF8F85"/>
    </linearGradient>
    <linearGradient id="roseGoldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C8C0"/>
      <stop offset="100%" stop-color="#D4A89D"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#243060"/>
      <stop offset="100%" stop-color="#1C2340"/>
    </linearGradient>
    <linearGradient id="headphoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0C0B8"/>
      <stop offset="100%" stop-color="#D4A89D"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1C2340" flood-opacity="0.15"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="240" r="148" fill="#FDF8F6" stroke="url(#roseGold)" stroke-width="1.5"/>
  <circle cx="200" cy="240" r="142" fill="none" stroke="url(#roseGold)" stroke-width="0.8" opacity="0.5"/>

  <!-- Left botanical leaf branch -->
  <g transform="translate(72, 178)" stroke="url(#roseGold)" fill="none" stroke-width="1.2" stroke-linecap="round">
    <path d="M0 0 Q-15 20 -8 45 Q-2 65 15 72" stroke-width="1"/>
    <path d="M-8 20 Q-18 18 -22 12" stroke-width="1"/>
    <path d="M-12 32 Q-22 30 -26 24" stroke-width="1"/>
    <path d="M-10 44 Q-20 46 -24 52" stroke-width="1"/>
    <path d="M-4 56 Q-12 60 -16 66" stroke-width="1"/>
    <!-- Small filled leaf dots -->
    <circle cx="-22" cy="12" r="2.5" fill="url(#roseGoldLight)" stroke="none"/>
    <circle cx="-26" cy="24" r="2" fill="url(#roseGoldLight)" stroke="none"/>
    <circle cx="-24" cy="52" r="2.5" fill="url(#roseGoldLight)" stroke="none"/>
    <circle cx="-16" cy="66" r="2" fill="url(#roseGoldLight)" stroke="none"/>
  </g>

  <!-- Top right sparkle stars -->
  <g fill="#F0A8B8" opacity="0.8">
    <path d="M290 170 Q294 168 296 164 Q298 168 302 170 Q298 172 296 176 Q294 172 290 170Z"/>
    <path d="M310 150 Q312 148 313 146 Q314 148 316 150 Q314 152 313 154 Q312 152 310 150Z" transform="scale(0.7) translate(135, 68)"/>
    <path d="M278 156 Q281 154 282 151 Q283 154 286 156 Q283 158 282 161 Q281 158 278 156Z" transform="scale(0.6) translate(190, 107)"/>
  </g>

  <!-- Speech bubble -->
  <g filter="url(#softShadow)">
    <rect x="128" y="138" width="144" height="128" rx="32" ry="32" fill="#FFFFFF" stroke="url(#roseGoldLight)" stroke-width="1"/>
    <path d="M175 266 L165 288 L192 264" fill="#FFFFFF" stroke="url(#roseGoldLight)" stroke-width="1"/>
    <path d="M175 266 L165 288 L192 264" fill="#FFFFFF" stroke="none"/>
  </g>

  <!-- Robot face (navy screen) -->
  <g transform="translate(167, 170)">
    <rect x="0" y="0" width="66" height="58" rx="12" ry="12" fill="url(#navyGrad)" filter="url(#softShadow)"/>
    <!-- Screen glare -->
    <path d="M8 6 Q12 4 18 6" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Happy closed eyes -->
    <path d="M18 24 Q22 20 26 24" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M40 24 Q44 20 48 24" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Blush cheeks -->
    <ellipse cx="16" cy="32" rx="5" ry="3" fill="rgba(201,154,154,0.35)"/>
    <ellipse cx="50" cy="32" rx="5" ry="3" fill="rgba(201,154,154,0.35)"/>
    <!-- Small smile -->
    <path d="M28 36 Q33 41 38 36" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Headphones -->
  <g transform="translate(167, 170)">
    <!-- Headband -->
    <path d="M14 -8 Q33 -22 52 -8" stroke="url(#headphoneGrad)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- Left ear cup -->
    <rect x="6" y="-6" width="14" height="20" rx="7" ry="7" fill="url(#headphoneGrad)" filter="url(#softShadow)"/>
    <rect x="9" y="-3" width="8" height="14" rx="4" ry="4" fill="rgba(0,0,0,0.15)"/>
    <!-- Right ear cup -->
    <rect x="46" y="-6" width="14" height="20" rx="7" ry="7" fill="url(#headphoneGrad)" filter="url(#softShadow)"/>
    <rect x="49" y="-3" width="8" height="14" rx="4" ry="4" fill="rgba(0,0,0,0.15)"/>
  </g>

  <!-- Microphone headset -->
  <g transform="translate(167, 170)">
    <path d="M58 4 Q64 6 64 16 Q64 26 60 30" stroke="#2A2A2A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <rect x="56" y="28" width="8" height="10" rx="3" ry="3" fill="#2A2A2A"/>
    <rect x="57" y="36" width="6" height="4" rx="2" fill="#3A3A3A"/>
  </g>

  <!-- KRITHI text -->
  <text x="200" y="430" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" letter-spacing="6" fill="#1C2340">KRITHI</text>

  <!-- Care text (cursive) -->
  <text x="200" y="462" text-anchor="middle" font-family="'Brush Script MT', 'Segoe Script', 'Comic Sans MS', cursive" font-size="28" font-style="italic" fill="url(#roseGold)">
    <tspan>Care</tspan>
    <tspan fill="#F0A8B8" font-size="22"> ♥</tspan>
  </text>

  <!-- Tagline -->
  <g transform="translate(200, 495)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-weight="500" letter-spacing="3.5" fill="#C9A49A">
      <tspan fill="#F0A8B8">♥</tspan>
      <tspan> WE CARE, YOU SHOP </tspan>
      <tspan fill="#F0A8B8">♥</tspan>
    </text>
  </g>
</svg>